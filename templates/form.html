{% extends "base.html" %}
{% block content %}
<div class="form-container">
    <h1> Generador de Contratos</h1>
    <p class="subtitle">Completa los datos para generar tu documento legal.</p>

    <!-- Usamos form_data para rellenar si hubo error -->
    <form method="POST" enctype="multipart/form-data" id="contractForm">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        
        <!-- SECCIÓN 1: DATOS BÁSICOS -->
        <fieldset>
            <legend>Datos Básicos</legend>
            <div class="grid-2">
                <div>
                    <label>Prestador (Tú)</label>
                    <input type="text" name="provider_name" value="{{ form_data.provider_name if form_data else '' }}" placeholder="Nombre completo" required>
                    <input type="text" name="provider_phone" value="{{ form_data.provider_phone if form_data else '' }}" placeholder="Teléfono (mínimo 7 dígitos)" pattern="[0-9]{7,}" required>
                </div>
                <div>
                    <label>Cliente</label>
                    <input type="text" name="client_name" value="{{ form_data.client_name if form_data else '' }}" placeholder="Nombre completo" required>
                    <input type="text" name="client_phone" value="{{ form_data.client_phone if form_data else '' }}" placeholder="Teléfono (mínimo 7 dígitos)" pattern="[0-9]{7,}" required>
                </div>
            </div>
            
            <!-- NUEVO CAMPO: Ciudad -->
            <label>Ciudad de Expedición</label>
            <input type="text" name="city_location" value="{{ form_data.city_location if form_data else '' }}" placeholder="Ej: Guadalajara, Monterrey, CDMX..." required>

            <div class="file-upload-wrapper">
                <label>📷 Logo (Opcional)</label>
                <input type="file" name="logo" accept="image/png, image/jpeg" onchange="previewLogo(this)">
                <img id="logoPreview" class="hidden" alt="Vista previa">
            </div>
        </fieldset>

        <!-- SECCIÓN 2: SERVICIO -->
        <fieldset>
            <legend>Detalles del Servicio</legend>
            <label>Tipo de Servicio</label>
            <select name="service_type" id="serviceType" onchange="toggleOtherService()">
                <option value="Soporte Técnico" {{ 'selected' if form_data and form_data.service_type == 'Soporte Técnico' else '' }}>Soporte Técnico</option>
                <option value="Electricidad" {{ 'selected' if form_data and form_data.service_type == 'Electricidad' else '' }}>Electricidad</option>
                <option value="Plomería" {{ 'selected' if form_data and form_data.service_type == 'Plomería' else '' }}>Plomería</option>
                <option value="Enseñanza" {{ 'selected' if form_data and form_data.service_type == 'Enseñanza' else '' }}>Enseñanza</option>
                <option value="Otros" {{ 'selected' if form_data and form_data.service_type == 'Otros' else '' }}>Otro...</option>
            </select>
            
            <!-- Input personalizado para "Otros" -->
            <input type="text" name="service_title_custom" id="customServiceInput" 
                   value="{{ form_data.service_title if form_data and form_data.service_type == 'Otros' else '' }}" 
                   class="{{ 'hidden' if not form_data or form_data.service_type != 'Otros' else '' }}" 
                   placeholder="Especifique el servicio personalizado">
            
            <label>Título Corto del Servicio</label>
            <input type="text" name="service_title" value="{{ form_data.service_title if form_data and form_data.service_type != 'Otros' else '' }}" placeholder="Ej: Mantenimiento PC" required>

            <label>Descripción Detallada</label>
            <textarea name="service_desc" rows="3" placeholder="Describe exactamente qué harás..." required>{{ form_data.service_desc if form_data else '' }}</textarea>

            <div class="checkbox-group">
                <div class="form-row-inline">
                    <label class="checkbox-label-inline">
                        <input type="checkbox" name="has_materials" id="hasMaterials" onchange="toggleMaterials()" {{ 'checked' if form_data and form_data.has_materials else '' }}>
                        ¿Incluye Materiales?
                    </label>
                    <label class="checkbox-label-inline">
                        <input type="checkbox" name="is_quote_pending" {{ 'checked' if form_data and form_data.is_quote_pending else '' }}> Cotización Pendiente
                    </label>
                </div>
                <div id="materialsOptions" class="{{ 'hidden' if not form_data or not form_data.has_materials else '' }}">
                    <textarea name="materials_details" placeholder="Lista de materiales incluidos...">{{ form_data.materials_details if form_data else '' }}</textarea>
                </div>
            </div>
        </fieldset>

        <!-- SECCIÓN 3: PAGOS -->
        <fieldset>
            <legend>Pagos y Fechas</legend>
            <div class="grid-2">
                <div>
                    <label>Estructura</label>
                    <select name="payment_structure" id="payStructure" onchange="calcRemaining()">
                        <option value="single" {{ 'selected' if form_data and form_data.payment_structure == 'single' else '' }}>Pago Único</option>
                        <option value="advance" {{ 'selected' if form_data and form_data.payment_structure == 'advance' else '' }}>Anticipo + Resto</option>
                        <option value="partial" {{ 'selected' if form_data and form_data.payment_structure == 'partial' else '' }}>Parcial</option>
                    </select>
                </div>
                <div>
                    <label>Momento del Pago</label>
                    <select name="payment_timing" id="payTiming" onchange="togglePenalties()">
                        <option value="before" {{ 'selected' if form_data and form_data.payment_timing == 'before' else '' }}>Antes de iniciar</option>
                        <option value="after" {{ 'selected' if form_data and form_data.payment_timing == 'after' else '' }}>Al finalizar</option>
                    </select>
                </div>
            </div>

            <div class="grid-3">
                <div>
                    <label>Total ($)</label>
                    <input type="number" step="0.01" name="total_amount" id="totalAmount" value="{{ form_data.total_amount if form_data else '' }}" oninput="calcRemaining()" required>
                </div>
                <div id="advanceDiv" class="{{ 'hidden' if not form_data or form_data.payment_structure == 'single' else '' }}">
                    <label>Anticipo ($)</label>
                    <input type="number" step="0.01" name="advance_amount" id="advanceAmount" value="{{ form_data.advance_amount if form_data else '' }}" oninput="calcRemaining()">
                </div>
                <div id="remainingDiv" class="{{ 'hidden' if not form_data or form_data.payment_structure == 'single' else '' }}">
                    <label>Resto ($)</label>
                    <input type="number" step="0.01" name="remaining_amount" id="remainingAmount" value="{{ form_data.remaining_amount if form_data else '' }}" readonly>
                </div>
            </div>

            <label>Método de Pago</label>
            <select name="payment_method" id="payMethod" onchange="togglePaymentDetails()">
                <option value="cash" {{ 'selected' if form_data and form_data.payment_method == 'cash' else '' }}>Efectivo</option>
                <option value="transfer" {{ 'selected' if form_data and form_data.payment_method == 'transfer' else '' }}>Transferencia Bancaria</option>
                <option value="crypto" {{ 'selected' if form_data and form_data.payment_method == 'crypto' else '' }}>Criptomoneda</option>
                <option value="other" {{ 'selected' if form_data and form_data.payment_method == 'other' else '' }}>Otro</option>
            </select>

            <div id="bankDetails" class="{{ 'hidden' if not form_data or form_data.payment_method != 'transfer' else '' }}">
                <input type="text" name="bank_details" value="{{ form_data.bank_details if form_data else '' }}" placeholder="Banco y CLABE/Account">
            </div>
            <div id="cryptoDetails" class="{{ 'hidden' if not form_data or form_data.payment_method != 'crypto' else '' }}">
                <input type="text" name="crypto_wallet" value="{{ form_data.crypto_wallet if form_data else '' }}" placeholder="Dirección de Wallet">
            </div>
            <div id="otherDetails" class="{{ 'hidden' if not form_data or form_data.payment_method != 'other' else '' }}">
                <input type="text" name="other_method" value="{{ form_data.other_method if form_data else '' }}" placeholder="Detalles del método">
            </div>

            <label>Fecha Límite de Entrega</label>
            <input type="date" name="deadline" value="{{ form_data.deadline if form_data else '' }}" required>

            <div id="penaltySection" class="{{ 'hidden' if form_data and form_data.payment_timing == 'before' else '' }}">
                <label class="checkbox-label">
                    <input type="checkbox" name="apply_penalty" checked> Aplicar penalización por retraso
                </label>
                <input type="number" step="0.1" name="penalty_rate" value="{{ form_data.penalty_rate if form_data else '5.0' }}" placeholder="% diario">
            </div>
        </fieldset>

        <!-- BOTÓN DESPLEGABLE AVANZADO -->
        <button type="button" class="btn-toggle" onclick="toggleAdvanced()"> Opciones Avanzadas (RFC, Firmas...)</button>
        
        <div id="advancedOptions" class="{{ 'hidden' if not form_data else '' }} advanced-panel">
            <div class="grid-2">
                <input type="text" name="rfc_provider" value="{{ form_data.rfc_provider if form_data else '' }}" placeholder="RFC Prestador">
                <input type="text" name="rfc_client" value="{{ form_data.rfc_client if form_data else '' }}" placeholder="RFC Cliente">
                <input type="text" name="address_provider" value="{{ form_data.address_provider if form_data else '' }}" placeholder="Dirección Prestador">
                <input type="text" name="address_client" value="{{ form_data.address_client if form_data else '' }}" placeholder="Dirección Cliente">
                <input type="email" name="email_client" value="{{ form_data.email_client if form_data else '' }}" placeholder="Email Cliente">
                <input type="text" name="witness_name" value="{{ form_data.witness_name if form_data else '' }}" placeholder="Nombre Testigo">
            </div>
            <label class="checkbox-label">
                <input type="checkbox" name="include_confidentiality" {{ 'checked' if form_data and form_data.include_confidentiality else '' }}> Incluir Confidencialidad
            </label>
            <label class="checkbox-label">
                <input type="checkbox" name="include_signatures" id="includeSignatures" onchange="toggleSignatureNames()" {{ 'checked' if form_data and form_data.include_signatures else '' }}> Imprimir Espacio para Firmas
            </label>
            <div id="signatureNames" class="grid-3 {{ 'hidden' if not form_data or not form_data.include_signatures else '' }}">
                <input type="text" name="sig_provider_name" value="{{ form_data.sig_provider_name if form_data else '' }}" placeholder="Nombre Impreso (Prestador)">
                <input type="text" name="sig_client_name" value="{{ form_data.sig_client_name if form_data else '' }}" placeholder="Nombre Impreso (Cliente)">
                <input type="text" name="sig_witness_name" value="{{ form_data.sig_witness_name if form_data else '' }}" placeholder="Nombre Impreso (Testigo)">
            </div>
        </div>

        <button type="submit" class="btn-generate"> Cerrar Trato y Generar Contrato</button>
    </form>
</div>
{% endblock %}
